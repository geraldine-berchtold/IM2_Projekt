<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Truth or Dare</title>
    <link rel="stylesheet" href="test.css" />
  </head>
  <body>
    <div class="site-frame">
      <!-- HERO -->
      <section id="hero">
        <img
          class="logo-corner"
          src="IM2_Projekt/images/logo-icon_desktop.png"
          alt="Truth or Dare logo"
        />
        <h1 class="neon-title">TRUTH</h1>
        <h1 class="neon-title">OR</h1>
        <h1 class="neon-title">DARE</h1>
        <p class="bodytext">
          A game ranging from harmless fun to bold, daring moments
        </p>
        <a href="#rating-block" class="play-btn" id="play-btn">PLAY NOW</a>
        <img
          class="arrow-img"
          src="IM2_Projekt/images/arrow_desktop.png"
          alt="arrow to scroll down"
        />
      </section>

      <!-- pick-your-level -->
      <section class="pick-your-level">
        <h2 class="section-title">PICK YOUR LEVEL</h2>
        <div class="rating-row">
          <div class="rating-item">
            <button class="rating-btn" id="pg">PG</button>
            <p class="bodytext">harmless but a bit awkward</p>
          </div>
          <div class="rating-item">
            <button class="rating-btn" id="pg13">PG-13</button>
            <p class="bodytext">flirty and slightly daring</p>
          </div>
          <div class="rating-item">
            <button class="rating-btn" id="r">18+</button>
            <p class="bodytext">bold, unfiltered, and risky</p>
          </div>
        </div>
      </section>
  </body>
</html>
